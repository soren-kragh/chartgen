<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive SVG</title>
  <style>
    text {
      font-family: "Noto Mono", "Lucida Sans Typewriter", "Courier New", monospace;
      font-size: 12;
    }
    html, body {
      margin: 0;
      padding: 0;
    }
    .hide-cursor {
      cursor: none;
    }
  </style>
</head>
<body>
  <svg width="800" height="600" id="svgCanvas">
    <g style="pointer-events: none;">

      <!-- Visible decorative objects -->
      <g stroke="black" stroke-width="2" fill="white" >
        <rect x="100" y="100" width="600" height="400" />
        <line x1="100" y1="100" x2="100" y2="80" />
        <line x1="200" y1="100" x2="200" y2="80" />
        <line x1="300" y1="100" x2="300" y2="80" />
        <line x1="400" y1="100" x2="400" y2="80" />
        <line x1="500" y1="100" x2="500" y2="80" />
        <line x1="600" y1="100" x2="600" y2="80" />
        <line x1="700" y1="100" x2="700" y2="80" />
        <circle cx="350" cy="250" r="10" stroke="none" fill="blue" />
        <circle cx="370" cy="270" r="10" stroke="none" fill="blue" />
      </g>

      <!-- Invisible interaction objects -->
      <g stroke="none" fill="transparent" style="pointer-events: all;">
        <g id="snapPoints" >
          <circle cx="350" cy="250" r="20" id="0" />
          <circle cx="370" cy="270" r="20" id="1" />
        </g>
      </g>

    </g>
  </svg>

<script>
////////////////////////////////////////////////////////////////////////////////

const chart = {
  crosshairLineColor : "#000000",
  crosshairFillColor : "#FFFFFF",
  infoBoxLineColor : "#000000",
  infoBoxFillColor : "#EEEEEE",

  valueFontSize : 12,

  areaX1 : 100,
  areaY1 : 100,
  areaX2 : 700,
  areaY2 : 500,

  axisX : [
    { show : true,
      isCategory : true,
      areaVal1 : -6,
      areaVal2 : 6,
      legalVal1 : -5,
      legalVal2 : 5
    },
    { show : true,
      isCategory : true,
      logarithmic : true,
      areaVal1 : 1,
      areaVal2 : 100,
      legalVal1 : -10e99,
      legalVal2 : +10e99
    }
  ],

  axisY : [
    { show : true,
      isCategory : false,
      areaVal1 : 50,
      areaVal2 : 0,
      legalVal1 : 50,
      legalVal2 : 0
    },
    { show : true,
      isCategory : false,
      areaVal1 : 100000,
      areaVal2 : 0,
      legalVal1 : 100000,
      legalVal2 : 0
    }
  ],

  axisSwap : false,

  categories : [],

  series : [
    { svgId : "c0s0"
    }
  ],

  data : [
    { s : 0,
      x : "Perl",
      y : "47.31"
    },
    { s : 0,
      x : "The x value",
      y : "The y value"
    }
  ],
};

const keepAwayFromAxis = 12;
const keepAwayFromCursor = 24;
const lineWidth = 1;
const dotSize = 8;

////////////////////////////////////////////////////////////////////////////////

const SVG_NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("svgCanvas");

////////////////////////////////////////////////////////////////////////////////

function determineAxisNumberFormat( axis ) {
  axis.decimals = 3;
  axis.scientific = axis.logarithmic;
  if ( !axis.logarithmic ) {
    const max = Math.max(Math.abs(axis.areaVal1), Math.abs(axis.areaVal2));
    if ( max < 1 ) {
      if ( x >= 0.1 ) {
        axis.decimals = 4;
      } else
      if ( x >= 0.01 ) {
        axis.decimals = 5;
      } else
      if ( x >= 0.001 ) {
        axis.decimals = 6;
      } else {
        axis.scientific = true;
      }
    } else {
      if ( max < 10 ) {
        axis.decimals = 3;
      } else
      if ( max < 100 ) {
        axis.decimals = 2;
      } else
      if ( max < 1000 ) {
        axis.decimals = 1;
      } else
      if ( max < 1e6 ) {
        let x = max;
        axis.rounding = 1;
        while (x > 10 * Math.abs(axis.coor1 - axis.coor2)) {
          x = x / 10;
          axis.rounding = axis.rounding * 10;
        }
        axis.decimals = 0;
      } else {
        axis.scientific = true;
      }
    }
  }
  if (Math.abs(axis.coor1 - axis.coor2) < 1000 && axis.decimals > 0) {
    axis.decimals--;
  }
}

function buildAxisNumber(num, axis, id) {
  if ( axis.rounding ) {
    num = Math.round( num / axis.rounding ) * axis.rounding;
  }

  let numTxt;
  if (axis.scientific) {
    numTxt = num.toExponential(axis.decimals);
  } else {
    numTxt = num.toFixed(axis.decimals);
  }
  const hasDigits = /[1-9]/.test(numTxt);
  if (hasDigits) {
    if (num >= 0) {
      numTxt = '+' + numTxt;
    }
  } else {
    numTxt = "0";
  }

  const group = document.createElementNS(SVG_NS, "g");
  group.setAttribute("id", id);
  group.setAttribute("style", "pointer-events: none;")
  group.setAttribute("fill", chart.infoBoxLineColor);
  group.setAttribute("stroke", "none");

  const parts = numTxt.split(/e/i);
  if (parts.length === 2) {
    const [base, exp] = parts;
    const baseElem = document.createElementNS(SVG_NS, "text");
    baseElem.setAttribute("font-size", chart.valueFontSize);
    baseElem.textContent = base + "×10";
    group.appendChild(baseElem);
    svg.appendChild(group);
    let bbox = group.getBBox();
    const expElem = document.createElementNS(SVG_NS, "text");
    expElem.setAttribute("font-size", chart.valueFontSize * 0.8);
    expElem.setAttribute("x", bbox.x + bbox.width);
    expElem.setAttribute("y", bbox.y + chart.valueFontSize * 0.5);
    expElem.textContent = exp;
    group.appendChild(expElem);
  } else {
    const text = document.createElementNS(SVG_NS, "text");
    text.setAttribute("font-size", chart.valueFontSize);
    text.textContent = numTxt;
    group.appendChild(text);
    svg.appendChild(group);
  }

  return group;
}

//------------------------------------------------------------------------------

function getLinAxisValue(x0, x1, x2, v1, v2) {
  if (x1 === x2) return NaN;
  const t = (x0 - x1) / (x2 - x1);
  return v1 + t * (v2 - v1);
}

function getLogAxisValue(x0, x1, x2, v1, v2) {
  if (x1 === x2 || v1 <= 0 || v2 <= 0) return NaN;
  const t = (x0 - x1) / (x2 - x1);
  return v1 * Math.pow(v2 / v1, t);
}

////////////////////////////////////////////////////////////////////////////////

function removeCrosshair() {
  let existing = document.getElementById("crosshair");
  if (existing) {
    existing.parentNode.removeChild(existing);
  }
  svg.classList.remove('hide-cursor');
}

function createCrosshair(x, y, atPoint) {
  removeCrosshair();

  let group = document.createElementNS(SVG_NS, "g");
  group.setAttribute("id", "crosshair");
  group.setAttribute("style", "pointer-events: none;")
  group.setAttribute("stroke-width", lineWidth)
  group.setAttribute("stroke-dasharray", "12 8")
  group.setAttribute("stroke", chart.crosshairLineColor)
  group.setAttribute("fill", chart.crosshairFillColor)

  {
    let line = document.createElementNS(SVG_NS, "line");
    line.setAttribute("x1", x);
    line.setAttribute("y1", y);
    line.setAttribute("x2", x);
    line.setAttribute("y2", chart.areaY2);
    group.appendChild(line);
  }
  {
    let line = document.createElementNS(SVG_NS, "line");
    line.setAttribute("x1", x);
    line.setAttribute("y1", y);
    line.setAttribute("x2", x);
    line.setAttribute("y2", chart.areaY1);
    group.appendChild(line);
  }

  {
    let line = document.createElementNS(SVG_NS, "line");
    line.setAttribute("x1", x);
    line.setAttribute("y1", y);
    line.setAttribute("x2", chart.areaX2);
    line.setAttribute("y2", y);
    group.appendChild(line);
  }
  {
    let line = document.createElementNS(SVG_NS, "line");
    line.setAttribute("x1", x);
    line.setAttribute("y1", y);
    line.setAttribute("x2", chart.areaX1);
    line.setAttribute("y2", y);
    group.appendChild(line);
  }

  if (atPoint) {
    let circle = document.createElementNS(SVG_NS, "circle");
    circle.setAttribute("cx", x);
    circle.setAttribute("cy", y);
    circle.setAttribute("r", dotSize/2);
    circle.setAttribute("stroke-dasharray", "none")
    group.appendChild(circle);
  } else {
    svg.classList.add('hide-cursor');
  }

  svg.appendChild(group);
}

////////////////////////////////////////////////////////////////////////////////

function removeAxisBox(id) {
  let existing = document.getElementById(id);
  if (existing) {
    existing.parentNode.removeChild(existing);
  }
}

function createAxisBox(id, x, y, axis, pos) {
  removeAxisBox(id);

  if (!axis.show) return;

  let coor = x;
  if (pos === "left" || pos === "right") {
    coor = y;
  }

  let val;
  if ( axis.logarithmic ) {
    val =
      getLogAxisValue(
        coor, axis.coor1, axis.coor2, axis.areaVal1, axis.areaVal2
      );
  } else {
    val =
      getLinAxisValue(
        coor, axis.coor1, axis.coor2, axis.areaVal1, axis.areaVal2
      );
  }

  if (
    (val < axis.legalVal1 && val < axis.legalVal2) ||
    (val > axis.legalVal1 && val > axis.legalVal2)
  )
    return;

  const group = buildAxisNumber(val, axis, id);
  let bbox = group.getBBox();

  const padX = chart.valueFontSize / 2;
  const padY = chart.valueFontSize / 4;

  {
    let rect = document.createElementNS(SVG_NS, "rect");
    rect.setAttribute("x", bbox.x - padX);
    rect.setAttribute("y", bbox.y - padY);
    rect.setAttribute("width", bbox.width + 2 * padX);
    rect.setAttribute("height", bbox.height + 2 * padY);
    rect.setAttribute("rx", padX);
    rect.setAttribute("fill", chart.infoBoxFillColor);
    rect.setAttribute("stroke-width", lineWidth)
    rect.setAttribute("stroke", chart.infoBoxLineColor);
    group.insertBefore(rect, group.firstChild);
  }

  bbox = group.getBBox();

  let transX = -bbox.width/2 - bbox.x;
  let transY = -bbox.height/2 - bbox.y;

  let space = keepAwayFromAxis + keepAwayFromCursor;

  switch (pos) {
    case "top":
      transX += x;
      if ( y - chart.areaY1 < bbox.height + space ) {
        transY += y - bbox.height/2 - keepAwayFromCursor;
      } else {
        transY += chart.areaY1 + bbox.height/2 + keepAwayFromAxis;
      }
      break;
    case "bottom":
      transX += x;
      if ( chart.areaY2 - y < bbox.height + space ) {
        transY += y + bbox.height/2 + keepAwayFromCursor;
      } else {
        transY += chart.areaY2 - bbox.height/2 - keepAwayFromAxis;
      }
      break;
    case "left":
      if ( x - chart.areaX1 < bbox.width + space ) {
        transX += x - bbox.width/2 - keepAwayFromCursor;
      } else {
        transX += chart.areaX1 + bbox.width/2 + keepAwayFromAxis;
      }
      transY += y;
      break;
    case "right":
      if ( chart.areaX2 - x < bbox.width + space ) {
        transX += x + bbox.width/2 + keepAwayFromCursor;
      } else {
        transX += chart.areaX2 - bbox.width/2 - keepAwayFromAxis;
      }
      transY += y;
      break;
  }

  group.setAttribute("transform", `translate(${transX}, ${transY})`);
}

////////////////////////////////////////////////////////////////////////////////

function removeInfoBox() {
  let existing = document.getElementById("info-box");
  if (existing) {
    existing.parentNode.removeChild(existing);
  }
}

function createInfoBox(pointId, x, y, anchor) {
  removeInfoBox();

  const item = chart.data[pointId];

  // Create a group (<g>) to hold the box and text
  const group = document.createElementNS(SVG_NS, "g");
  group.setAttribute("id", "info-box");
  group.setAttribute("font-weight", "bold")
  group.setAttribute("style", "pointer-events: none;")
  group.setAttribute("fill", chart.infoBoxLineColor);
  group.setAttribute("stroke", "none");

  const padX = chart.valueFontSize / 2;
  const padY = chart.valueFontSize / 4;

  let startX = 0;
  let startY = 0;

  {
    startY += chart.valueFontSize * 1.2;
    let text = document.createElementNS(SVG_NS, "text");
    text.setAttribute("x", startX);
    text.setAttribute("y", startY);
    text.setAttribute("font-size", chart.valueFontSize);
    text.textContent = "X: " + (chart.axisSwap ? item.y : item.x);
    group.appendChild(text);
  }

  {
    startY += chart.valueFontSize * 1.2;
    let text = document.createElementNS(SVG_NS, "text");
    text.setAttribute("x", startX);
    text.setAttribute("y", startY);
    text.setAttribute("font-size", chart.valueFontSize);
    text.textContent = "Y: " + (chart.axisSwap ? item.x : item.y);
    group.appendChild(text);
  }

  svg.appendChild(group);
  let bbox = group.getBBox();

  {
    let rect = document.createElementNS(SVG_NS, "rect");
    rect.setAttribute("x", bbox.x - padX);
    rect.setAttribute("y", bbox.y - padY);
    rect.setAttribute("width", bbox.width + 2 * padX);
    rect.setAttribute("height", bbox.height + 2 * padY);
    rect.setAttribute("rx", padX);
    rect.setAttribute("fill", chart.infoBoxFillColor);
    rect.setAttribute("stroke-width", lineWidth)
    rect.setAttribute("stroke", chart.infoBoxLineColor);
    group.insertBefore(rect, group.firstChild);
  }

  bbox = group.getBBox();

  let transX = x - bbox.x - bbox.width/2;
  let transY = y - bbox.y - bbox.height/2;
  transX -= anchor.anchorX * (bbox.width/2 + keepAwayFromCursor);
  transY -= anchor.anchorY * (bbox.height/2 + keepAwayFromCursor);

  group.setAttribute("transform", `translate(${transX}, ${transY})`);
}

////////////////////////////////////////////////////////////////////////////////

function getMouseSVGPoint(event) {
  const pt = svg.createSVGPoint();
  pt.x = event.clientX;
  pt.y = event.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

svg.addEventListener("mousemove", (event) => {
  const svgPoint = getMouseSVGPoint(event);
  const mouseX = svgPoint.x;
  const mouseY = svgPoint.y;

  if (
    mouseX >= chart.areaX1 && mouseX <= chart.areaX2 &&
    mouseY >= chart.areaY1 && mouseY <= chart.areaY2
  ) {
    const elems = document.elementsFromPoint(event.clientX, event.clientY);
    const snapCandidates =
      elems.filter(el => el.parentNode.id === 'snapPoints');

    let x = mouseX;
    let y = mouseY;
    let minDist = Infinity;
    let minId = Infinity;
    let atPoint = false;

    if (snapCandidates.length > 0) {
      snapCandidates.forEach(circle => {
        const cx = parseFloat(circle.getAttribute("cx"));
        const cy = parseFloat(circle.getAttribute("cy"));
        const dx = mouseX - cx;
        const dy = mouseY - cy;
        const dist = dx * dx + dy * dy;
        if (dist < minDist) {
          minDist = dist;
          minId = parseInt(circle.getAttribute("id"));
          x = cx;
          y = cy;
          atPoint = true;
        }
      });
      let anchor = { anchorX : -1, anchorY : -1 };
      if (x > (chart.areaX2 + chart.areaX1)/2) anchor.anchorX = 1;
      if (y > (chart.areaY2 + chart.areaY1)/2) anchor.anchorY = 1;
      createInfoBox(minId, x, y, anchor);
    } else {
      removeInfoBox();
    }

    createCrosshair(x, y, atPoint);
    createAxisBox("axisX_0", x, y, chart.axisX[0], "top");
    createAxisBox("axisX_1", x, y, chart.axisX[1], "bottom");
    createAxisBox("axisY_0", x, y, chart.axisY[0], "left");
    createAxisBox("axisY_1", x, y, chart.axisY[1], "right");
  } else {
    removeAxisBox("axisX_0");
    removeAxisBox("axisX_1");
    removeAxisBox("axisY_0");
    removeAxisBox("axisY_1");
    removeCrosshair();
    removeInfoBox();
  }
});

svg.addEventListener("mouseleave", () => {
  removeAxisBox("axisX_0");
  removeAxisBox("axisX_1");
  removeAxisBox("axisY_0");
  removeAxisBox("axisY_1");
  removeCrosshair();
  removeInfoBox();
});

////////////////////////////////////////////////////////////////////////////////
// Main.

{
  chart.axisX.forEach(axis => {
    axis.coor1 = chart.areaX1;
    axis.coor2 = chart.areaX2;
    determineAxisNumberFormat( axis );
  });
  chart.axisY.forEach(axis => {
    axis.coor1 = chart.areaY1;
    axis.coor2 = chart.areaY2;
    determineAxisNumberFormat( axis );
  });
}

////////////////////////////////////////////////////////////////////////////////
</script>

</body>
</html>
