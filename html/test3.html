<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive SVG</title>
  <style>
    text {
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <svg width="800" height="600" id="svgCanvas">
    <!-- Visible decorative objects -->
    <g stroke="black" stroke-width="3" fill="yellow" style="pointer-events: none;">
      <rect x="100" y="100" width="600" height="400" />
      <circle cx="350" cy="250" r="100" fill="none" />
      <circle cx="450" cy="350" r="100" fill="none" />
    </g>

    <!-- Invisible interaction objects -->
    <g stroke="none" fill="none" style="pointer-events: visible;" id="interactionLayer">
      <rect x="100" y="100" width="600" height="400" id="interactionArea" />
      <g id="snapPoints" fill="transparent">
        <circle cx="350" cy="250" r="100" />
        <circle cx="450" cy="350" r="100" />
      </g>
    </g>
  </svg>

  <script>
    const svg = document.getElementById("svgCanvas");
    const interactionArea = document.getElementById("interactionArea");

    // Create crosshair lines
    const crosshairV = document.createElementNS("http://www.w3.org/2000/svg", "line");
    const crosshairH = document.createElementNS("http://www.w3.org/2000/svg", "line");
    crosshairV.setAttribute("stroke", "red");
    crosshairH.setAttribute("stroke", "red");
    crosshairV.setAttribute("stroke-width", "1");
    crosshairH.setAttribute("stroke-width", "1");
    crosshairV.style.pointerEvents = "none";
    crosshairH.style.pointerEvents = "none";
    crosshairV.style.display = "none";
    crosshairH.style.display = "none";
    svg.appendChild(crosshairV);
    svg.appendChild(crosshairH);

    const areaX1 = parseFloat(interactionArea.getAttribute("x"));
    const areaY1 = parseFloat(interactionArea.getAttribute("y"));
    const areaY2 = areaX1 + parseFloat(interactionArea.getAttribute("width"));
    const areaX2 = areaY1 + parseFloat(interactionArea.getAttribute("height"));

    function getMouseSVGPoint(event) {
      const pt = svg.createSVGPoint();
      pt.x = event.clientX;
      pt.y = event.clientY;
      return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function updateCrosshair(X, Y) {
      {
        crosshairV.setAttribute("x1", X);
        crosshairV.setAttribute("y1", areaY1);
        crosshairV.setAttribute("x2", X);
        crosshairV.setAttribute("y2", areaX2);
      }
      {
        crosshairH.setAttribute("x1", areaX1);
        crosshairH.setAttribute("y1", Y);
        crosshairH.setAttribute("x2", areaY2);
        crosshairH.setAttribute("y2", Y);
      }
    }

    svg.addEventListener("mousemove", (event) => {
      const svgPoint = getMouseSVGPoint(event);
      const mouseX = svgPoint.x;
      const mouseY = svgPoint.y;

      if (
        mouseX >= areaX1 && mouseX <= areaY2 &&
        mouseY >= areaY1 && mouseY <= areaX2
      ) {
        crosshairV.style.display = "inline";
        crosshairH.style.display = "inline";

        const elems = document.elementsFromPoint(event.clientX, event.clientY);
        const snapCandidates =
          elems.filter(el => el.parentNode.id === 'snapPoints');

        let snapX = mouseX;
        let snapY = mouseY;
        let minDist = Infinity;

        if (snapCandidates.length > 0) {
          console.log( "snapCandidates: ", snapCandidates.length );
          snapCandidates.forEach(circle => {
            const cx = parseFloat(circle.getAttribute("cx"));
            const cy = parseFloat(circle.getAttribute("cy"));
            const r = parseFloat(circle.getAttribute("r"));
            const dx = mouseX - cx;
            const dy = mouseY - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist <= r && dist < minDist) {
              minDist = dist;
              snapX = cx;
              snapY = cy;
            }
          });
        }

        updateCrosshair(snapX, snapY);
      } else {
        crosshairV.style.display = "none";
        crosshairH.style.display = "none";
      }
    });

    svg.addEventListener("mouseleave", () => {
      crosshairV.style.display = "none";
      crosshairH.style.display = "none";
    });
  </script>
</body>
</html>
